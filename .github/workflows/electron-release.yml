name: Electron Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  check:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      should_build: ${{ steps.tag.outputs.should_build }}
    steps:
      - name: Download release info
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: release-info
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read release tag
        id: tag
        run: |
          if [ -f release-info.txt ]; then
            TAG=$(grep '^TAG=' release-info.txt | cut -d= -f2)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Found release tag: $TAG"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "No release-info artifact found; Release workflow run did not publish a release."
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_script: electron:build -- --mac
          - os: windows-latest
            build_script: electron:build -- --win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm run ${{ matrix.build_script }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          files: |
            dist-electron-build/*.dmg
            dist-electron-build/*.zip
            dist-electron-build/*.exe
            dist-electron-build/*.blockmap
            dist-electron-build/latest.yml
            dist-electron-build/latest-mac.yml
          token: ${{ secrets.GITHUB_TOKEN }}
